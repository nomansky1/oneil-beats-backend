<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Welcome to CoverLoop Pro</title>
<meta name="robots" content="noindex">
<style>
  body{margin:0;background:#08080b;color:#f2f2f5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:grid;place-items:center;min-height:100vh;text-align:center;padding:24px}
  .box{max-width:520px;background:#121218;border:1px solid #23232c;border-radius:18px;padding:44px 32px}
  .badge{width:64px;height:64px;border-radius:16px;margin:0 auto 18px;background:linear-gradient(135deg,#f0d57a,#d4af37);display:grid;place-items:center;font-size:32px;color:#1a1305}
  h1{margin:0 0 10px;font-size:26px}
  p{color:#bcbcc6;font-size:15.5px;line-height:1.6;margin:0 0 8px}
  .accent{color:#d4af37;font-weight:700}
  a{color:#d4af37}
</style>
</head>
<body>
  <div class="box">
    <div class="badge">✓</div>
    <h1>You're now <span class="accent">CoverLoop Pro</span></h1>
    <p>Your subscription is active. <b>Return to the CoverLoop app</b> — unlimited renders, batch, scheduling and all Pro features are unlocked (click "Refresh" in the app if it still shows Free).</p>
    <p style="margin-top:18px;color:#6c6c78;font-size:13px">Manage or cancel anytime from your Stripe receipt email · <a href="/coverloop.html">CoverLoop home</a></p>
  </div>
</body>
</html>
